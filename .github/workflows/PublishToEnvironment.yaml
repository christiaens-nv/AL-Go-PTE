name: ' Publish To Environment'

on:
  workflow_dispatch:
    inputs:
      appVersion:
        description: App version to deploy to environment(s) (current, prerelease, draft, latest, version number or PR_<PR Id>)
        required: false
        default: 'current'
      environmentName:
        description: Environment mask to receive the new version (* for all, PROD* for all environments starting with PROD)
        required: true
      createEnvIfNotExists:
        description: Create environment if it does not exist (use with care, yourEnvName_AuthContext yourEnvName_EnvironmentName yourEnvName_Scope must be defined as environment secrets/variables or repo secrets/variables)
        type: boolean
        default: false

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: read
  checks: read

defaults:
  run:
    shell: powershell

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  Initialization:
    needs: [ ]
    runs-on: [ windows-latest ]
    outputs:
      environmentsMatrixJson: ${{ steps.DetermineDeploymentEnvironments.outputs.EnvironmentsMatrixJson }}
      environmentCount: ${{ steps.DetermineDeploymentEnvironments.outputs.EnvironmentCount }}
      deploymentEnvironmentsJson: ${{ steps.DetermineDeploymentEnvironments.outputs.DeploymentEnvironmentsJson }}
      deviceCode: ${{ steps.Authenticate.outputs.deviceCode }}
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
    steps:
      - name: Dump Workflow Information
        uses: microsoft/AL-Go-Actions/DumpWorkflowInfo@v9.0
        with:
          shell: powershell

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v9.0
        with:
          shell: powershell

      - name: Read settings
        id: ReadSettings
        uses: microsoft/AL-Go-Actions/ReadSettings@v9.0
        with:
          shell: powershell

      - name: Determine Deployment Environments
        id: DetermineDeploymentEnvironments
        uses: microsoft/AL-Go-Actions/DetermineDeploymentEnvironments@v9.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          getEnvironments: ${{ github.event.inputs.environmentName }}
          type: 'Publish'
          createEnvIfNotExists: ${{ github.event.inputs.createEnvIfNotExists }}

      - name: EnvName
        id: envName
        if: steps.DetermineDeploymentEnvironments.outputs.UnknownEnvironment == 1
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          $envName = '${{ fromJson(steps.DetermineDeploymentEnvironments.outputs.environmentsMatrixJson).matrix.include[0].environment }}'.split(' ')[0]
          Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "envName=$envName"

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v9.0
        if: steps.DetermineDeploymentEnvironments.outputs.UnknownEnvironment == 1
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: '${{ steps.envName.outputs.envName }}-AuthContext,${{ steps.envName.outputs.envName }}_AuthContext,AuthContext'

      - name: Authenticate
        id: Authenticate
        if: steps.DetermineDeploymentEnvironments.outputs.UnknownEnvironment == 1
        run: |
          $envName = '${{ steps.envName.outputs.envName }}'
          $secretName = ''
          $secrets = '${{ steps.ReadSecrets.outputs.Secrets }}' | ConvertFrom-Json
          $authContext = $null
          "$($envName)-AuthContext", "$($envName)_AuthContext", "AuthContext" | ForEach-Object {
            if (!($authContext)) {
              if ($secrets."$_") {
                Write-Host "Using $_ secret as AuthContext"
                $authContext = $secrets."$_"
                $secretName = $_
              }
            }
          }
          if ($authContext) {
            Write-Host "AuthContext provided in secret $secretName!"
            Add-Content -Encoding UTF8 -path $ENV:GITHUB_STEP_SUMMARY -value "AuthContext was provided in a secret called $secretName. Using this information for authentication."
          }
          else {
            Write-Host "No AuthContext provided for $envName, initiating Device Code flow"
            $ALGoHelperPath = "$([System.IO.Path]::GetTempFileName()).ps1"
            $webClient = New-Object System.Net.WebClient
            $webClient.DownloadFile('https://raw.githubusercontent.com/microsoft/AL-Go-Actions/v9.0/AL-Go-Helper.ps1', $ALGoHelperPath)
            . $ALGoHelperPath
            DownloadAndImportBcContainerHelper
            $authContext = New-BcAuthContext -includeDeviceLogin -deviceLoginTimeout ([TimeSpan]::FromSeconds(0))
            Add-Content -Encoding UTF8 -path $ENV:GITHUB_STEP_SUMMARY -value "AL-Go needs access to the Business Central Environment $('${{ steps.envName.outputs.envName }}'.Split(' ')[0]) and could not locate a secret called ${{ steps.envName.outputs.envName }}_AuthContext`n`n$($authContext.message)"
            Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "deviceCode=$($authContext.deviceCode)"
          }

  Deploy:
    needs: [ Initialization ]
    if: needs.Initialization.outputs.environmentCount > 0
    strategy: ${{ fromJson(needs.Initialization.outputs.environmentsMatrixJson) }}
    runs-on: ${{ fromJson(matrix.os) }}
    name: Deploy to ${{ matrix.environment }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    environment:
      name: ${{ matrix.environment }}
      url: ${{ steps.Deploy.outputs.environmentUrl }}
    env:
      deviceCode: ${{ needs.Initialization.outputs.deviceCode }}
      ALGoEnvSettings: ${{ vars.ALGoEnvironmentSettings }}
      ALGoEnvName: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: EnvName
        id: envName
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          $envName = '${{ matrix.environment }}'.split(' ')[0]
          Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "envName=$envName"

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v9.0
        with:
          shell: ${{ matrix.shell }}
          get: type,powerPlatformSolutionFolder

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v9.0
        with:
          shell: ${{ matrix.shell }}
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: '${{ steps.envName.outputs.envName }}-AuthContext,${{ steps.envName.outputs.envName }}_AuthContext,AuthContext'

      - name: Get Artifacts for deployment
        uses: microsoft/AL-Go-Actions/GetArtifactsForDeployment@v9.0
        with:
          shell: ${{ matrix.shell }}
          artifactsVersion: ${{ github.event.inputs.appVersion }}
          artifactsFolder: '.artifacts'
          buildMode: ${{ matrix.buildMode }}

      - name: Deploy to Business Central
        id: Deploy
        uses: microsoft/AL-Go-Actions/Deploy@v9.0
        env:
          Secrets: '${{ steps.ReadSecrets.outputs.Secrets }}'
        with:
          shell: ${{ matrix.shell }}
          environmentName: ${{ matrix.environment }}
          artifactsFolder: '.artifacts'
          type: 'Publish'
          deploymentEnvironmentsJson: ${{ needs.Initialization.outputs.deploymentEnvironmentsJson }}
          artifactsVersion: ${{ github.event.inputs.appVersion }}

      - name: Deploy to Power Platform
        if: env.type == 'PTE' && env.powerPlatformSolutionFolder != ''
        uses: microsoft/AL-Go-Actions/DeployPowerPlatform@v9.0
        env:
          Secrets: '${{ steps.ReadSecrets.outputs.Secrets }}'
        with:
          shell: ${{ matrix.shell }}
          environmentName: ${{ matrix.environment }}
          artifactsFolder: '.artifacts'
          deploymentEnvironmentsJson: ${{ needs.Initialization.outputs.deploymentEnvironmentsJson }}


  CustomJobTagDeployment:
    name: Tag deployment and post changelog
    needs: [ Initialization, Deploy ]
    if: (!cancelled()) && (needs.Deploy.result == 'success')
    runs-on: [ windows-latest ]
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Artifacts for deployment
        uses: microsoft/AL-Go-Actions/GetArtifactsForDeployment@v9.0
        with:
          shell: powershell
          artifactsVersion: ${{ github.event.inputs.appVersion }}
          artifactsFolder: '.artifacts'
          buildMode: Default

      - name: Tag deployments and post changelog
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $errorActionPreference = "Stop"

          $version = Get-ChildItem '.artifacts' -Directory |
              ForEach-Object { if ($_.Name -match '-Apps-(\d+\.\d+\.\d+\.\d+)') { $Matches[1] } } |
              Select-Object -First 1

          if (-not $version) {
              Write-Host "::warning::No versioned artifact found in .artifacts — skipping deployment tags."
              exit 0
          }

          $environments = ('${{ needs.Initialization.outputs.environmentsMatrixJson }}' | ConvertFrom-Json).matrix.include |
              ForEach-Object { $_.environment.Split(' ')[0] }

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          foreach ($envName in $environments) {
              $newTag = "deployed/$envName/$version"

              gh api "repos/$env:GITHUB_REPOSITORY/git/refs/tags/$newTag" 2>$null | Out-Null
              if ($LASTEXITCODE -eq 0) {
                  Write-Host "Tag $newTag already exists — skipping."
                  continue
              }

              $previousTag = $null
              $allTags = gh api "repos/$env:GITHUB_REPOSITORY/git/refs/tags/deployed/$envName/" 2>$null | ConvertFrom-Json
              if ($allTags) {
                  $previousTag = @($allTags) |
                      Sort-Object { $_.ref } -Descending |
                      Select-Object -First 1 |
                      ForEach-Object { $_.ref -replace 'refs/tags/', '' }
              }

              git tag $newTag
              git push origin $newTag
              Write-Host "Created tag: $newTag"

              if ($previousTag) {
                  $compareUrl  = "https://github.com/$env:GITHUB_REPOSITORY/compare/$previousTag...$newTag"
                  $comparison  = gh api "repos/$env:GITHUB_REPOSITORY/compare/$previousTag...$newTag" | ConvertFrom-Json
                  $commitLines = $comparison.commits | ForEach-Object {
                      "- ``$($_.sha.Substring(0,7))`` $($_.commit.message.Split("`n")[0])"
                  }
                  if (-not $commitLines) { $commitLines = @("_(no code changes between these versions)_") }
              }
              else {
                  $compareUrl  = "https://github.com/$env:GITHUB_REPOSITORY/commits/$newTag"
                  $commitLines = @("_(no previous deployment tag found — this is the first tracked deployment)_")
                  $previousTag = "—"
              }

              $summary = @"
          ## Deployment to ``$envName`` — version ``$version``

          | | |
          |---|---|
          | **Environment** | ``$envName`` |
          | **Version deployed** | ``$version`` |
          | **Previous version** | ``$previousTag`` |
          | **Full diff** | [Compare on GitHub]($compareUrl) |

          ### Commits included in this deployment
          $($commitLines -join "`n")
          "@
              $summary | Add-Content -Path $env:GITHUB_STEP_SUMMARY
              Write-Host $summary
          }

  PostProcess:
    needs: [ Initialization, Deploy, CustomJobTagDeployment ]
    if: always()
    runs-on: [ windows-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Finalize the workflow
        id: PostProcess
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@v9.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          telemetryScopeJson: ${{ needs.Initialization.outputs.telemetryScopeJson }}
          currentJobContext: ${{ toJson(job) }}
